<section class="character-list">
  <div class="character-list__header">
    <h2 class="character-list__title">Personajes</h2>
    <span class="character-list__count">
      {{ characterService.total() }} personajes
    </span>
  </div>

  @if (characterService.loading()) {
    <app-loading-spinner />
  }

  @if (characterService.error()) {
    <p class="character-list__error">{{ characterService.error() }}</p>
  }

  @if (!characterService.loading() && !characterService.error()) {
    <div class="character-list__grid">
      @for (character of characterService.characters(); track character.id) {
        <app-character-card [character]="character" />
      }
    </div>
  }
</section>
